# DatadogAgent Custom Resource
# This configures the Datadog agent deployed by the operator
#
# PREREQUISITE: Create datadog-secret before applying
# See: secrets-templates/datadog-secret.yaml
---
apiVersion: datadoghq.com/v2alpha1
kind: DatadogAgent
metadata:
  name: datadog-agent
  namespace: datadog
spec:
  global:
    clusterName: golden-k3s
    site: datadoghq.com
    credentials:
      apiSecret:
        secretName: datadog-secret
        keyName: api-key
      appSecret:
        secretName: datadog-secret
        keyName: app-key
  features:
    logCollection:
      enabled: true
      containerCollectAll: true
    liveContainerCollection:
      enabled: true
    liveProcessCollection:
      enabled: true
    eventCollection:
      collectKubernetesEvents: true
    orchestratorExplorer:
      enabled: true
    kubeStateMetricsCore:
      enabled: true
    usm:
      enabled: true
  override:
    nodeAgent:
      env:
        - name: DD_CONTAINERD_SOCKET_PATH
          value: /run/k3s/containerd/containerd.sock
