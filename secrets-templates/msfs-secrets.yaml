# MSFS Top Charts Application Secrets Template
# Replace <PLACEHOLDER> values before applying
# DO NOT commit actual values to git!
---
apiVersion: v1
kind: Namespace
metadata:
  name: msfs-top-charts
---
apiVersion: v1
kind: Secret
metadata:
  name: msfs-secrets
  namespace: msfs-top-charts
type: Opaque
stringData:
  ADMIN_USER: "<ADMIN_USERNAME>"
  ADMIN_PASS: "<ADMIN_PASSWORD>"
  # Connection string to shared postgresql database
  DATABASE_URL: "postgresql://user:password@postgresql.postgresql.svc.cluster.local:5432/msfs"
  # Generate with: openssl rand -hex 32
  SESSION_SECRET: "<SESSION_SECRET>"
