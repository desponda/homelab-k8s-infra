# Cloudflare Tunnel Secret Template
# Replace <PLACEHOLDER> values before applying
# DO NOT commit actual values to git!
---
apiVersion: v1
kind: Namespace
metadata:
  name: cloudflare-tunnel
---
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-api
  namespace: cloudflare-tunnel
type: Opaque
stringData:
  # Get from Cloudflare dashboard: https://dash.cloudflare.com/profile/api-tokens
  api-token: "<CLOUDFLARE_API_TOKEN>"
  # Get from Cloudflare dashboard: Account ID shown on overview page
  cloudflare-account-id: "<CLOUDFLARE_ACCOUNT_ID>"
  # Name of your Cloudflare tunnel
  cloudflare-tunnel-name: "<TUNNEL_NAME>"
