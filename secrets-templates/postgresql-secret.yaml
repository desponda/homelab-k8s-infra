# PostgreSQL Shared Database Secret Template
# Replace <PLACEHOLDER> values before applying
# DO NOT commit actual values to git!
#
# Note: This secret is auto-managed by the Bitnami PostgreSQL Helm chart
# If you need to set a specific password, create this secret BEFORE
# deploying the postgresql ArgoCD Application
---
apiVersion: v1
kind: Namespace
metadata:
  name: postgresql
---
apiVersion: v1
kind: Secret
metadata:
  name: postgresql
  namespace: postgresql
type: Opaque
stringData:
  # Set your postgres password
  # Generate with: openssl rand -base64 24
  postgres-password: "<POSTGRES_PASSWORD>"
