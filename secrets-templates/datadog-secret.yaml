# Datadog Secret Template
# Replace <PLACEHOLDER> values before applying
# DO NOT commit actual values to git!
---
apiVersion: v1
kind: Namespace
metadata:
  name: datadog
---
apiVersion: v1
kind: Secret
metadata:
  name: datadog-secret
  namespace: datadog
type: Opaque
stringData:
  # Get from Datadog: Organization Settings > API Keys
  api-key: "<DATADOG_API_KEY>"
  # Get from Datadog: Organization Settings > Application Keys
  app-key: "<DATADOG_APP_KEY>"
