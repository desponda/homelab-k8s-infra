# GitHub Container Registry Credentials Template
# Replace <PLACEHOLDER> values before applying
# DO NOT commit actual values to git!
#
# This secret is needed for pulling private images from ghcr.io
---
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-credentials
  namespace: vocab-app-staging
type: kubernetes.io/dockerconfigjson
stringData:
  # Generate the .dockerconfigjson value:
  # echo -n '{"auths":{"ghcr.io":{"auth":"'$(echo -n "USERNAME:GITHUB_PAT" | base64)'"}}}'
  .dockerconfigjson: |
    {
      "auths": {
        "ghcr.io": {
          "auth": "<BASE64_ENCODED_USERNAME:PAT>"
        }
      }
    }
