# Tailscale Operator Secret Template
# Replace <PLACEHOLDER> values before applying
# DO NOT commit actual values to git!
---
apiVersion: v1
kind: Namespace
metadata:
  name: tailscale
---
apiVersion: v1
kind: Secret
metadata:
  name: operator-oauth
  namespace: tailscale
type: Opaque
stringData:
  # Create OAuth client at: https://login.tailscale.com/admin/settings/oauth
  # Scopes needed: devices (read, write), auth-keys (read, write)
  client_id: "<TAILSCALE_OAUTH_CLIENT_ID>"
  client_secret: "<TAILSCALE_OAUTH_CLIENT_SECRET>"
