# Root Application - App of Apps Pattern
# This application manages all other infrastructure applications
# Apply this AFTER ArgoCD is installed and secrets are created
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-infrastructure
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/desponda/homelab-k8s-infra.git
    targetRevision: main
    path: infrastructure/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
