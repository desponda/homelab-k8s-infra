# Datadog Operator Application
# Provides monitoring and observability
#
# PREREQUISITE: Create the datadog-secret before syncing
# See: secrets-templates/datadog-secret.yaml
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: datadog-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://helm.datadoghq.com
    chart: datadog-operator
    targetRevision: 2.9.2
  destination:
    server: https://kubernetes.default.svc
    namespace: datadog
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
