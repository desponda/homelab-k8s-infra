# DatadogAgent Configuration Application
# Deploys the DatadogAgent custom resource
# Must sync AFTER datadog-operator is ready
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: datadog-agent-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/desponda/homelab-k8s-infra.git
    targetRevision: main
    path: manifests
    directory:
      include: "datadog-agent.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: datadog
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
