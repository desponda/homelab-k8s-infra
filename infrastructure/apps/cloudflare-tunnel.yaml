# Cloudflare Tunnel Ingress Controller Application
# Provides public ingress via Cloudflare tunnels
#
# PREREQUISITE: Create the cloudflare-api secret before syncing
# See: secrets-templates/cloudflare-tunnel-secret.yaml
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflare-tunnel
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://helm.strrl.dev
    chart: cloudflare-tunnel-ingress-controller
    targetRevision: 0.0.18
    helm:
      values: |
        cloudflare:
          apiToken:
            existingSecret:
              name: cloudflare-api
              key: api-token
          accountId:
            existingSecret:
              name: cloudflare-api
              key: cloudflare-account-id
          tunnelName:
            existingSecret:
              name: cloudflare-api
              key: cloudflare-tunnel-name
  destination:
    server: https://kubernetes.default.svc
    namespace: cloudflare-tunnel
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
