# NumberSense Staging Application
# K-3 Math Education App - Number Sense Builder
#
# To deploy: Copy this file to your homelab-k8s-infra repo:
#   applications/apps/numbers-sense-staging.yaml
#
# NOTE: Container image is public (ghcr.io/desponda/numbers-sense) - no pull secrets needed
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: numbers-sense-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/desponda/numbers-sense.git
    targetRevision: chaoskube
    path: k8s/helm/numbers-sense
    helm:
      valueFiles:
        - values.yaml
      parameters:
        - name: global.environment
          value: staging
        - name: ingress.hosts[0].host
          value: numbers-sense-staging.dresponda.com
  destination:
    server: https://kubernetes.default.svc
    namespace: numbers-sense-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
