# ChoreQuest Application
# Family chore gamification app with RPG quest theme
#
# PREREQUISITES before first sync:
#   1. Sealed secrets committed (chore-quest-secret, chore-quest-ghcr-credentials)
#   2. PostgreSQL database created — see docs/chore-quest-db-init.md
#
# The db-init Job (sync-wave: 1) creates the DB on first deploy.
# Prisma migrations run automatically via init container on every deploy.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chore-quest
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/desponda/chore-quest.git
    targetRevision: main
    path: k8s/helm/chore-quest
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: chore-quest
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
